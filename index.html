<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelstrike56 | Hub</title>
    <style>
        /* 1. ON DÉFINIT LES COULEURS PAR DÉFAUT (MODE CLAIR) */
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-main: #1f2328;
            --text-secondary: #636c76;
            --accent-color: #0969da;
            --btn-bg: #2da44e;
            --btn-hover: #2c974b;
            --border-color: #d0d7de;
        }

        /* 2. ON CHANGE LES COULEURS SI L'APPAREIL EST EN MODE SOMBRE */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --text-main: #c9d1d9;
                --text-secondary: #8b949e;
                --accent-color: #58a6ff;
                --btn-bg: #238636;
                --btn-hover: #2ea043;
                --border-color: #30363d;
            }
        }

        /* 3. LE DESIGN (RESTE LE MÊME) */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease; /* Transition douce lors du changement de mode */
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 80%;
        }

        h1 { 
            color: var(--accent-color); 
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p { 
            color: var(--text-secondary); 
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 12px 24px;
            background: var(--btn-bg);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--btn-hover); }
    </style>
</head>
<body>

    <div class="card">
        <h1>Pixelstrike56</h1>
        <p>Bienvenue sur mon espace personnel.<br>Le thème s'adapte à ton appareil !</p>
        <a href="#" class="btn">Voir mes projets</a>
    </div>
    
    <script>
        console.log("Adaptation du thème activée ! Mode sombre/clair détecté.");
    </script>
</body>
</html>
